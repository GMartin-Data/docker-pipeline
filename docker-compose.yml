services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  pipeline:
    build: ./pipeline
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: